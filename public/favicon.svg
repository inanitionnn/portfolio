<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Window background -->
  <rect x="1" y="1" width="30" height="30" fill="#c0c0c0"/>
  <!-- Outer border: light top/left, dark bottom/right (Win98 raised) -->
  <rect x="0" y="0" width="32" height="1" fill="#ffffff"/>
  <rect x="0" y="0" width="1" height="32" fill="#ffffff"/>
  <rect x="0" y="31" width="32" height="1" fill="#808080"/>
  <rect x="31" y="0" width="1" height="32" fill="#808080"/>
  <!-- Inner border -->
  <rect x="1" y="1" width="30" height="1" fill="#dfdfdf"/>
  <rect x="1" y="1" width="1" height="30" fill="#dfdfdf"/>
  <rect x="1" y="30" width="30" height="1" fill="#404040"/>
  <rect x="30" y="1" width="1" height="30" fill="#404040"/>
  <!-- Title bar -->
  <rect x="2" y="2" width="28" height="10" fill="#000080"/>
  <!-- Title bar text dots (simulate "W98") -->
  <rect x="4"  y="5" width="1" height="4" fill="#ffffff"/>
  <rect x="5"  y="7" width="1" height="2" fill="#ffffff"/>
  <rect x="6"  y="5" width="1" height="4" fill="#ffffff"/>
  <!-- minimize/close buttons in title bar -->
  <rect x="22" y="3" width="7" height="7" fill="#c0c0c0"/>
  <rect x="22" y="3" width="7" height="1" fill="#ffffff"/>
  <rect x="22" y="3" width="1" height="7" fill="#ffffff"/>
  <rect x="22" y="9" width="7" height="1" fill="#808080"/>
  <rect x="28" y="3" width="1" height="7" fill="#808080"/>
  <!-- X mark on close button -->
  <rect x="24" y="5" width="1" height="1" fill="#000000"/>
  <rect x="26" y="5" width="1" height="1" fill="#000000"/>
  <rect x="25" y="6" width="1" height="1" fill="#000000"/>
  <rect x="24" y="7" width="1" height="1" fill="#000000"/>
  <rect x="26" y="7" width="1" height="1" fill="#000000"/>
  <!-- Window body (white area) -->
  <rect x="2" y="13" width="28" height="17" fill="#ffffff"/>
  <!-- Some "content" lines to suggest a window -->
  <rect x="4" y="16" width="18" height="1" fill="#c0c0c0"/>
  <rect x="4" y="19" width="14" height="1" fill="#c0c0c0"/>
  <rect x="4" y="22" width="16" height="1" fill="#c0c0c0"/>
</svg>
